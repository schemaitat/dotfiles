# Set vi key bindings mode
set -g mode-keys vi
set -g status-keys vi

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Native Dracula-colored status bar (no plugin, no shell-exec overhead)
set -g status-interval 5
set -g status-style 'bg=#282a36,fg=#f8f8f2'

# Left: "Running as <user> on <host> in <env>", then session name
set -g status-left-length 80
set -g status-left '#[bg=#50fa7b,fg=#282a36,bold] Running as #(whoami) on #H in #(~/.tmux/scripts/env-kind.sh) #[bg=#bd93f9,fg=#50fa7b]#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#282a36,fg=#bd93f9]'

# Windows
set -g window-status-format ' #I:#W#F '
set -g window-status-current-format '#[bg=#44475a,fg=#f8f8f2,bold] #I:#W#F #[bg=#282a36,fg=#44475a]'
set -g window-status-style 'fg=#6272a4'
set -g window-status-separator ''

# Right: date, time
set -g status-right-length 60
set -g status-right '#[fg=#6272a4]#[bg=#6272a4,fg=#282a36] %d/%m #[bg=#bd93f9,fg=#282a36,bold] %H:%M '

# Pane borders
set -g pane-border-style 'fg=#44475a'
set -g pane-active-border-style 'fg=#bd93f9'

# Message style
set -g message-style 'bg=#bd93f9,fg=#282a36'

# Set 256 colors
set -s default-terminal 'tmux-256color'

# Reduce Escape key delay (default 500ms lags Vim/Neovim mode switches)
set -sg escape-time 10

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# switch panes using vim-style hjkl (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# swap windows with shift+arrow with prefix
bind-key S-Left swap-window -t -1
bind-key S-Right swap-window -t +1

# copy from tmux to clipboard (macOS)
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy" \; display-message "Copied to clipboard"
bind-key -T copy-mode-vi Y send-keys -X copy-pipe "pbcopy" \; display-message "Copied to clipboard"
bind-key C-p run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# turn mouse on
set -g mouse on
# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
